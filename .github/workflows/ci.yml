# Fails the PR if lint, TypeScript, or production build breaks — same gates as Vercel `bun run build`.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full gate (npm run check + next build — ESLint, tsc, Next TS step; ignoreBuildErrors must stay false)
        run: pnpm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
